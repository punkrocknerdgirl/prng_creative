<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:26px;background:#fff;font-family:var(--font-mono);}
.row{display:flex;gap:28px;}
.box{width:150px;height:72px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--prng-muted);}
</style></head><body>
  <div class="row">
    <div class="box" style="box-shadow:var(--shadow-sm)">shadow-sm</div>
    <div class="box" style="box-shadow:var(--shadow-md)">shadow-md</div>
    <div class="box" style="box-shadow:var(--shadow-lg)">shadow-lg (hover)</div>
  </div>
</body></html>
