<!-- @dsCard group="Colors" viewport="700x150" name="Semantic / Status" subtitle="Financial reads: positive, negative, warning, info" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-mono);}
  .row{display:flex;gap:8px;}
  .sw{flex:1;height:90px;border-radius:4px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:#fff;}
  .n{font-size:0.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
  .h{font-size:0.56rem;opacity:.9;}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#27AE60"><span class="n">positive</span><span class="h">#27AE60 · profit</span></div>
    <div class="sw" style="background:#C0392B"><span class="n">negative</span><span class="h">#C0392B · loss</span></div>
    <div class="sw" style="background:#F39C12"><span class="n">warning</span><span class="h">#F39C12 · caution</span></div>
    <div class="sw" style="background:#2F75B5"><span class="n">info</span><span class="h">#2F75B5 · note</span></div>
    <div class="sw" style="background:#7F8C8D"><span class="n">neutral</span><span class="h">#7F8C8D</span></div>
  </div>
</body></html>
