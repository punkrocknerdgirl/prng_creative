<!-- @dsCard group="Colors" viewport="700x150" name="Working Palette — Blue & Neutral" subtitle="Blues + the neutral grey ramp" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-mono);}
  .grp{margin-bottom:10px;}
  .lbl{font-size:0.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--prng-muted);margin-bottom:5px;}
  .row{display:flex;gap:6px;}
  .sw{flex:1;height:54px;border-radius:3px;display:flex;align-items:flex-end;padding:6px 8px;color:#fff;}
  .h{font-size:0.56rem;opacity:.92;}
</style></head><body>
  <div class="grp"><div class="lbl">Blue</div><div class="row">
    <div class="sw" style="background:#2F75B5"><span class="h">#2F75B5</span></div>
    <div class="sw" style="background:#5B9BD5"><span class="h">#5B9BD5</span></div>
  </div></div>
  <div class="grp"><div class="lbl">Neutral</div><div class="row">
    <div class="sw" style="background:#7F8C8D"><span class="h">#7F8C8D</span></div>
    <div class="sw" style="background:#B0B0B0;color:#1A0A12"><span class="h">#B0B0B0</span></div>
    <div class="sw" style="background:#D9D9D9;color:#1A0A12"><span class="h">#D9D9D9</span></div>
  </div></div>
</body></html>
