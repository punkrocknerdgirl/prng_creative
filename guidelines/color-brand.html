<!-- @dsCard group="Colors" viewport="700x150" name="Brand Core" subtitle="Plum / pink / blush — the PRNG identity palette" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-mono);}
  .row{display:flex;gap:0;}
  .sw{flex:1;height:96px;border-radius:0;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .sw:first-child{border-radius:4px 0 0 4px;}.sw:last-child{border-radius:0 4px 4px 0;}
  .n{font-size:0.6rem;font-weight:600;letter-spacing:.04em;}
  .h{font-size:0.58rem;opacity:.85;}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:#C9538C;color:#fff"><span class="n">pink</span><span class="h">#C9538C</span></div>
    <div class="sw" style="background:#5C1F3B;color:#fff"><span class="n">plum</span><span class="h">#5C1F3B</span></div>
    <div class="sw" style="background:#3A1025;color:#fff"><span class="n">plum-dark</span><span class="h">#3A1025</span></div>
    <div class="sw" style="background:#1A0A12;color:#fff"><span class="n">ink</span><span class="h">#1A0A12</span></div>
    <div class="sw" style="background:#7A5068;color:#fff"><span class="n">muted</span><span class="h">#7A5068</span></div>
    <div class="sw" style="background:#F0D0E4;color:#5C1F3B"><span class="n">blush-mid</span><span class="h">#F0D0E4</span></div>
    <div class="sw" style="background:#FAEAF3;color:#5C1F3B"><span class="n">blush-light</span><span class="h">#FAEAF3</span></div>
  </div>
</body></html>
