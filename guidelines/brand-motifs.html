<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:0;font-family:var(--font-mono);display:flex;height:180px;}
.panel{flex:1;position:relative;display:flex;flex-direction:column;justify-content:center;padding:20px;}
.grid{background:var(--prng-plum-dark);background-image:var(--grid-lines);background-size:24px 24px;}
.eb{font-size:0.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--prng-pink);}
.zine{font-family:var(--font-display);font-style:italic;color:#fff;font-size:1.3rem;margin-top:6px;}
.rule{border-left:3px solid var(--prng-pink);padding-left:12px;color:var(--prng-muted);font-family:var(--font-sans);font-size:0.85rem;line-height:1.5;}
</style></head><body>
  <div class="panel grid"><span class="eb">// field notes</span><span class="zine">graph-paper grid</span></div>
  <div class="panel" style="background:#fff;"><div class="rule">The pink left-rule marks pull-quotes, taglines, and footnotes across every surface.</div></div>
</body></html>
