<!-- @dsCard group="Colors" viewport="700x150" name="Working Palette — Amber & Green" subtitle="Warm accents + greens for positive reads" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-mono);}
  .grp{margin-bottom:10px;}
  .lbl{font-size:0.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--prng-muted);margin-bottom:5px;}
  .row{display:flex;gap:6px;}
  .sw{flex:1;height:54px;border-radius:3px;display:flex;align-items:flex-end;padding:6px 8px;color:#fff;}
  .h{font-size:0.56rem;opacity:.92;}
</style></head><body>
  <div class="grp"><div class="lbl">Warm Accent</div><div class="row">
    <div class="sw" style="background:#F39C12"><span class="h">#F39C12 amber</span></div>
    <div class="sw" style="background:#E67E22"><span class="h">#E67E22 orange</span></div>
    <div class="sw" style="background:#F4B183;color:#1A0A12"><span class="h">#F4B183 soft</span></div>
  </div></div>
  <div class="grp"><div class="lbl">Greens</div><div class="row">
    <div class="sw" style="background:#27AE60"><span class="h">#27AE60</span></div>
    <div class="sw" style="background:#60BD68"><span class="h">#60BD68</span></div>
    <div class="sw" style="background:#82E0AA;color:#1A0A12"><span class="h">#82E0AA</span></div>
  </div></div>
</body></html>
