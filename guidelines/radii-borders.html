<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & Borders" subtitle="Sharp corners + the signature pink accent bar" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:22px;background:var(--prng-blush-light);font-family:var(--font-mono);}
.row{display:flex;gap:16px;align-items:center;}
.box{width:90px;height:64px;background:#fff;border:1px solid var(--prng-rule);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:0.54rem;color:var(--prng-muted);box-shadow:var(--shadow-sm);}
</style></head><body>
  <div class="row">
    <div class="box" style="border-radius:1px;border-top:3px solid var(--prng-pink)">xs 1px</div>
    <div class="box" style="border-radius:2px;border-top:3px solid var(--prng-pink)">sm 2px</div>
    <div class="box" style="border-radius:4px;border-top:3px solid var(--prng-pink)">md 4px</div>
    <div class="box" style="border-radius:4px;border-left:3px solid var(--prng-pink)">left accent</div>
    <div class="box" style="border-radius:20px;font-size:0.5rem">pill 20px</div>
  </div>
</body></html>
