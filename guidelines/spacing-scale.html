<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px base step: 4 → 80px" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-mono);}
.row{display:flex;align-items:flex-end;gap:14px;}
.col{display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{background:var(--prng-pink);width:26px;border-radius:2px;}
.lab{font-size:0.54rem;color:var(--prng-muted);}</style></head><body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span class="lab">1·4</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span class="lab">2·8</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span class="lab">3·12</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span class="lab">4·16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span class="lab">6·24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span class="lab">8·32</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span class="lab">12·48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span class="lab">16·64</span></div>
    <div class="col"><div class="bar" style="height:80px"></div><span class="lab">20·80</span></div>
  </div>
</body></html>
