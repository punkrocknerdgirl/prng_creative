<!-- @dsCard group="Colors" viewport="700x150" name="Working Palette — Teal & Purple" subtitle="Categorical data colors: aqua + plum-violet families" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:#fff;font-family:var(--font-mono);}
  .grp{margin-bottom:10px;}
  .lbl{font-size:0.58rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--prng-muted);margin-bottom:5px;}
  .row{display:flex;gap:6px;}
  .sw{flex:1;height:54px;border-radius:3px;display:flex;align-items:flex-end;padding:6px 8px;color:#fff;}
  .h{font-size:0.56rem;opacity:.92;}
</style></head><body>
  <div class="grp"><div class="lbl">Teal / Aqua</div><div class="row">
    <div class="sw" style="background:#2CA6A4"><span class="h">#2CA6A4</span></div>
    <div class="sw" style="background:#4BC0C0"><span class="h">#4BC0C0</span></div>
    <div class="sw" style="background:#76D7C4;color:#1A0A12"><span class="h">#76D7C4</span></div>
  </div></div>
  <div class="grp"><div class="lbl">Purple</div><div class="row">
    <div class="sw" style="background:#6B5B95"><span class="h">#6B5B95</span></div>
    <div class="sw" style="background:#8E7CC3"><span class="h">#8E7CC3</span></div>
    <div class="sw" style="background:#B4A7D6;color:#1A0A12"><span class="h">#B4A7D6</span></div>
  </div></div>
</body></html>
