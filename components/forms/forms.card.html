<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items:start; }
  .actions { display:flex; gap:10px; margin-top:18px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Select, Button } = window.PRNGDesignSystem_4a3ea3;
    function Demo() {
      return (
        <div>
          <div className="grid">
            <Input label="Your Name" placeholder="Ernie Hathaway" />
            <Input label="Email" type="email" placeholder="ernie@prngbooks.com" />
            <Select label="Service" options={['Bookkeeping','Payroll','Systems & Automation','Ops Consulting']} />
            <Input label="Monthly Revenue" placeholder="$0.00" hint="Ballpark is fine" />
          </div>
          <div className="actions">
            <Button variant="primary">Request Intro Call</Button>
            <Button variant="quiet">Reset</Button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
