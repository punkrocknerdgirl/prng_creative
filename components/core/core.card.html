<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: var(--font-sans); }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
  .panel-dark { background: var(--prng-ink); padding: 16px; border-radius: 4px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .lbl { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--prng-muted); width: 100%; margin-bottom: 2px; }
  .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, Pill, Card, Eyebrow } = window.PRNGDesignSystem_4a3ea3;
    function Demo() {
      return (
        <div>
          <div className="row">
            <span className="lbl">Buttons</span>
            <Button variant="primary">Book a Call</Button>
            <Button variant="secondary">Secondary</Button>
            <Button variant="quiet">Quiet</Button>
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary" size="lg">Large CTA</Button>
          </div>
          <div className="row">
            <span className="lbl">Ghost (on dark)</span>
            <div className="panel-dark">
              <Button variant="primary">Primary</Button>
              <Button variant="ghost">See What I Do →</Button>
            </div>
          </div>
          <div className="row">
            <span className="lbl">Badges &amp; Pills</span>
            <Badge tone="pink">QBO ProAdvisor Level 2</Badge>
            <Badge tone="muted">Texas-Based</Badge>
            <Pill>QBO</Pill><Pill>Month-End Close</Pill><Pill>Reporting</Pill>
          </div>
          <div className="grid2">
            <Card accent="top">
              <Eyebrow slash={false}>Bookkeeping</Eyebrow>
              <h3 style={{margin:'6px 0 6px', color:'var(--prng-plum)', fontSize:'1rem'}}>Accent-top card</h3>
              <p style={{margin:0, fontSize:'0.85rem', color:'var(--prng-muted)', lineHeight:1.5}}>Full-cycle bookkeeping, month-end close, and reporting.</p>
            </Card>
            <Card accent="left">
              <div style={{fontFamily:'var(--font-mono)', fontSize:'0.6rem', letterSpacing:'.14em', textTransform:'uppercase', color:'var(--prng-pink)', marginBottom:4}}>Email</div>
              <a href="#" style={{color:'var(--prng-plum)', fontWeight:500, textDecoration:'none', fontSize:'0.9rem'}}>ernie@prngbooks.com</a>
            </Card>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
